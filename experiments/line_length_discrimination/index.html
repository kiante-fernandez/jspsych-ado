<!DOCTYPE html>
<html>
    <head>
        <title>3IFC Line-Length Discrimination</title>
        <script src="jatos.js"></script>
        <base href="../../">
        <script>
            // Set base URL of file paths different for JATOS than other hosting environments
            const base = document.querySelector('base');
            base.href = typeof jatos !== 'undefined' ? '.' : '../../';
        </script>
        <script src="core/jspsych/jspsych.js"></script>
        <script src="core/jspsych/plugins/plugin-html-button-response.js"></script>
        <script src="core/jspsych/plugins/plugin-call-function.js"></script>
        <script src="core/jspsych/plugins/plugin-instructions.js"></script>
        <link href="core/jspsych/css/jspsych.css" rel="stylesheet" type="text/css"></link>
        <script src="core/init_experiment.js"></script>
        <style>
          .ll-stimulus-wrap {
            width: min(720px, calc(100vw - 48px));
            margin: 0 auto;
            text-align: center;
          }
          .ll-line-list {
            display: grid;
            gap: 18px;
            width: min(560px, calc(100vw - 48px));
            margin: 0 auto;
          }
          .ll-line-row {
            display: grid;
            grid-template-columns: 36px 1fr;
            align-items: center;
            gap: 12px;
          }
          .ll-line-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid #d1d5db;
            border-radius: 50%;
            color: #111827;
            font-weight: 700;
          }
          .ll-line-stage {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: calc(100vw - 48px);
            height: 82px;
            margin: 0 auto;
            border: 1px solid #e5e7eb;
            background: #ffffff;
          }
          .ll-line {
            height: 12px;
            background: #111827;
          }
          .ll-prompt {
            margin: 1.75rem 0 1rem;
            font-size: 1.25rem;
            color: #111827;
          }
          .ll-choice-button {
            min-width: 120px;
            min-height: 48px;
            padding: 0.75rem 1.25rem;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            background: #ffffff;
            color: #111827;
            font: inherit;
            cursor: pointer;
          }
          .ll-choice-button:hover {
            border-color: #2563eb;
          }
          .ll-choice-button:focus-visible {
            outline: 3px solid #93c5fd;
            outline-offset: 2px;
          }
          .ll-choice-button[disabled] {
            opacity: 0.5;
            cursor: default;
          }
        </style>
    </head>
    <body></body>
    <script type="module">
        import { makeDebriefStimulus } from "./jspsych-ado/ado/ado_timeline.js";
        import { createSeededRng, simulateCategoricalChoice } from "./jspsych-ado/ado/ado_simulation.js";
        import {
            addAdoDataProperties,
            createExperimentAdoTimeline,
            getExperimentRunSettings,
            makeAdoRunContext,
            makeEndSimulationData,
            makeInstructionSimulationData,
            registerAdoExperiment,
            resolveSimulationConfig,
        } from "./jspsych-ado/ado/experiment_shell.js";
        import lineLengthTask from "./jspsych-ado/tasks/line_length_discrimination/task.js";
        import lineLengthModel from "./jspsych-ado/models/line_length_discrimination_3ifc/model.js";
        import {
            default_line_length_config,
            default_line_length_simulation_config,
        } from "./experiments/line_length_discrimination/line_length_config.js";

        const using_jatos = typeof jatos !== 'undefined';
        const jatos_instance = using_jatos ? jatos : null;
        const url_params = new URLSearchParams(window.location.search);
        const run_config = window.__JSPSYCH_ADO_RUN_CONFIG__ || {};
        const session_id = using_jatos ? jatos.studyResultId : "local-" + Date.now();
        const available_controllers = ["mock", "stan", "quest_plus"];
        const run_settings = getExperimentRunSettings(url_params, {
            controllers: available_controllers,
        });
        const simulation_config = resolveSimulationConfig(
            default_line_length_simulation_config,
            run_config,
            run_settings.simulation_mode
        );
        const simulation_rng = createSeededRng(simulation_config.seed);

        const run_context = makeAdoRunContext({
            run_settings: run_settings,
            model: lineLengthModel,
            using_jatos: using_jatos,
            session_id: session_id,
            simulate_choice: function(design) {
                return simulateCategoricalChoice(design, simulation_config, simulation_rng, lineLengthModel, {
                    response_labels: lineLengthTask.response_labels,
                });
            },
            jatos_instance: jatos_instance,
        });

        registerAdoExperiment({
            task: lineLengthTask,
            model: lineLengthModel,
            config: default_line_length_config,
        });

        async function makeOptionalControllerFactories(run_settings) {
            if (run_settings.controller_mode !== "quest_plus") {
                return {};
            }
            const [{ createQuestPlusController }, { default: QuestPlus }] = await Promise.all([
                import("./jspsych-ado/controllers/quest_plus_controller.js"),
                import("./core/jsquest-plus/jsQuestPlus.module.js"),
            ]);
            return {
                quest_plus: {
                    max_testlet_size: 1,
                    create: function({ task, model, config, session_id }) {
                        return createQuestPlusController({
                            QuestPlus: QuestPlus,
                            model: model,
                            grid_design: task.design_grid,
                            quest_plus: config.quest_plus,
                            session_id: session_id,
                            n_trials: config.n_trials,
                        });
                    },
                },
            };
        }

        const controller_factories = await makeOptionalControllerFactories(run_settings);

        const instructions = {
            type: jsPsychInstructions,
            pages: [
                '<p>Welcome to the line-length discrimination task.</p><p>You will see three horizontal lines on each trial.</p>',
                '<p>Two lines are the same length. One line is longer.</p><p>Choose which line is longest: <strong>A</strong>, <strong>B</strong>, or <strong>C</strong>.</p><p>There is no feedback in this prototype.</p>',
                '<p>Press Next when you are ready to begin.</p>',
            ],
            show_clickable_nav: true,
            key_forward: 'm',
            key_backward: 'z',
            button_label_previous: 'Previous (<strong>Z</strong>)',
            button_label_next: 'Next (<strong>M</strong>)',
            simulation_options: {
                data: makeInstructionSimulationData(3, simulation_config),
            },
        };

        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>',
            on_start: function(trial) {
                var bar = document.getElementById("ado-live-posterior-chart");
                if (bar) { bar.remove(); }
                trial.stimulus = run_context.debug
                    ? makeDebriefStimulus(run_context.param_history || {}, run_context.posterior_display)
                    : '<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>';
            },
            choices: ["SUBMIT"],
            simulation_options: {
                data: makeEndSimulationData(simulation_config),
            },
        };

        jsPsych = initializeExperiment();
        addAdoDataProperties(jsPsych, {
            run_settings: run_settings,
            model: lineLengthModel,
            simulation_config: simulation_config,
            using_jatos: using_jatos,
        });

        let timeline = [instructions];
        timeline = timeline.concat(createExperimentAdoTimeline(jsPsych, {
            task: lineLengthTask,
            model: lineLengthModel,
            config: default_line_length_config,
            run_context: run_context,
            session_id: session_id,
            design_seed: run_config.controller ? run_config.controller.design_seed : null,
            controller_factories: controller_factories,
        }));
        timeline.push(end_screen);

        if (run_settings.simulation_mode) {
            jsPsych.simulate(timeline, run_settings.simulation_mode);
        } else {
            jsPsych.run(timeline);
        }
    </script>
</html>
