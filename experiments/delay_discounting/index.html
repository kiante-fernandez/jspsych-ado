<!DOCTYPE html>
<html>
    <head>
        <title>Delay Discounting</title>
        <base href="../../">
        <script src="core/jspsych/jspsych.js"></script>
        <script src="core/jspsych/plugins/plugin-html-button-response.js"></script>
        <script src="core/jspsych/plugins/plugin-call-function.js"></script>
        <script src="core/jspsych/plugins/plugin-instructions.js"></script>
        <link href="core/jspsych/css/jspsych.css" rel="stylesheet" type="text/css"></link>
        <script src="core/init_experiment.js"></script>
        <style>
          .dd-option-card {
            all: unset;
            box-sizing: border-box;
            cursor: pointer;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 220px;
            min-height: 140px;
            padding: 1.75rem 1.25rem;
            background: #ffffff;
            border: 2px solid #d1d5db;
            border-radius: 10px;
            position: relative;
            vertical-align: middle;
            transition: border-color 0.12s, box-shadow 0.12s, transform 0.12s;
          }
          .dd-option-card:hover {
            border-color: #4f46e5;
            box-shadow: 0 6px 20px -6px rgba(0, 0, 0, 0.22);
            transform: translateY(-2px);
          }
          .dd-option-card:focus-visible {
            outline: 3px solid #818cf8;
            outline-offset: 2px;
          }
          .dd-option-card[disabled] {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
          }
          .dd-amount {
            font-family: ui-monospace, "Courier New", monospace;
            font-size: 2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #111827;
          }
          .dd-when {
            font-size: 0.9rem;
            color: #6b7280;
          }
          .dd-key-hint {
            position: absolute;
            top: 6px;
            right: 9px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.05em;
          }
          @media (prefers-reduced-motion: reduce) {
            .dd-option-card { transition: none; }
            .dd-option-card:hover { transform: none; }
          }
        </style>
    </head>
    <body></body>
    <script type="module">
        // The delay-discounting experiment is now a THIN CONSUMER of the general
        // jspsych-ado package: it registers the task/model pair and builds the
        // adaptive timeline from package controllers. Nothing here is ADO-engine-
        // or timeline-specific; all of that lives in ../../jspsych-ado/.
        import QuestPlus from "./core/jsquest-plus/jsQuestPlus.module.js";
        import hyperbolicModel from "./jspsych-ado/models/hyperbolic/model.js";
        import delayDiscountingTask from "./jspsych-ado/tasks/delay_discounting/task.js";
        import { makeDebriefStimulus, removeAdoDebugPanels } from "./jspsych-ado/ado/ado_timeline.js";
        import { createSeededRng, simulateDelayDiscountingChoice } from "./jspsych-ado/ado/ado_simulation.js";
        import {
            addAdoDataProperties,
            createExperimentAdoTimeline,
            getExperimentRunSettings,
            makeAdoRunContext,
            makeEndSimulationData,
            makeInstructionSimulationData,
            registerAdoExperiment,
            resolveSimulationConfig,
        } from "./jspsych-ado/ado/experiment_shell.js";
        import { default_dd_config, default_dd_simulation_config } from "./experiments/delay_discounting/dd_config.js";

        const url_params = new URLSearchParams(window.location.search);
        const run_config = window.__JSPSYCH_ADO_RUN_CONFIG__ || {};
        const session_id = "local-" + Date.now();

        const run_settings = getExperimentRunSettings(url_params, { allow_legacy_ado: true });
        const simulation_config = resolveSimulationConfig(
            default_dd_simulation_config,
            run_config,
            run_settings.simulation_mode
        );
        const simulation_rng = createSeededRng(simulation_config.seed);

        const run_context = makeAdoRunContext({
            run_settings: run_settings,
            model: hyperbolicModel,
            session_id: session_id,
            simulate_choice: function(design) {
                return simulateDelayDiscountingChoice(design, simulation_config, simulation_rng, hyperbolicModel);
            },
        });

        registerAdoExperiment({
            task: delayDiscountingTask,
            model: hyperbolicModel,
            config: default_dd_config,
        });

        const plain_finish_stimulus = '<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>';

        const instructions = {
            type: jsPsychInstructions,
            pages: [
                '<p>Welcome to the delay discounting task.</p><p>On each trial, choose between a smaller reward available sooner and a larger reward available later.</p>',
                '<p>The task will adapt after each response. Choose the option you genuinely prefer on each trial.</p>',
                '<p>Press Next when you are ready to begin.</p>',
            ],
            show_clickable_nav: true,
            key_forward: 'm',
            key_backward: 'z',
            button_label_previous: 'Previous (<strong>Z</strong>)',
            button_label_next: 'Next (<strong>M</strong>)',
            simulation_options: {
                data: makeInstructionSimulationData(3, simulation_config),
            },
        };

        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: plain_finish_stimulus,
            on_start: function(trial) {
                removeAdoDebugPanels();
                trial.stimulus = run_context.debug
                    ? makeDebriefStimulus(run_context.param_history || {}, run_context.posterior_display)
                    : plain_finish_stimulus;
            },
            choices: ["SUBMIT"],
            simulation_options: {
                data: makeEndSimulationData(simulation_config),
            },
        };

        jsPsych = initializeExperiment();
        addAdoDataProperties(jsPsych, {
            run_settings: run_settings,
            model: hyperbolicModel,
            simulation_config: simulation_config,
        });

        let timeline = [instructions];
        timeline = timeline.concat(createExperimentAdoTimeline(jsPsych, {
            QuestPlus: QuestPlus,
            task: delayDiscountingTask,
            model: hyperbolicModel,
            config: default_dd_config,
            run_context: run_context,
            session_id: session_id,
            design_seed: run_config.controller ? run_config.controller.design_seed : null,
        }));
        timeline.push(end_screen);

        if (run_settings.simulation_mode) {
            jsPsych.simulate(timeline, run_settings.simulation_mode);
        } else {
            jsPsych.run(timeline);
        }
    </script>
</html>
