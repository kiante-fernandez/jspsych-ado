<!DOCTYPE html>
<html>
    <head>
        <title>Delay Discounting</title>
        <script src="jatos.js"></script>
        <base href="../../">
        <script>
            // Set base URL of file paths different for JATOS than other hosting environments
            const base = document.querySelector('base');
            base.href = typeof jatos !== 'undefined' ? '.' : '../../';
        </script>
        <script src="core/jspsych/jspsych.js"></script>
        <script src="core/jspsych/plugins/plugin-html-button-response.js"></script>
        <script src="core/jspsych/plugins/plugin-call-function.js"></script>
        <script src="core/jspsych/plugins/plugin-instructions.js"></script>
        <link href="core/jspsych/css/jspsych.css" rel="stylesheet" type="text/css"></link>
        <script src="core/init_experiment.js"></script>
        <style>
          .dd-option-card {
            all: unset;
            box-sizing: border-box;
            cursor: pointer;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 220px;
            min-height: 140px;
            padding: 1.75rem 1.25rem;
            background: #ffffff;
            border: 2px solid #d1d5db;
            border-radius: 10px;
            position: relative;
            vertical-align: middle;
            transition: border-color 0.12s, box-shadow 0.12s, transform 0.12s;
          }
          .dd-option-card:hover {
            border-color: #4f46e5;
            box-shadow: 0 6px 20px -6px rgba(0, 0, 0, 0.22);
            transform: translateY(-2px);
          }
          .dd-option-card:focus-visible {
            outline: 3px solid #818cf8;
            outline-offset: 2px;
          }
          .dd-option-card[disabled] {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
          }
          .dd-amount {
            font-family: ui-monospace, "Courier New", monospace;
            font-size: 2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #111827;
          }
          .dd-when {
            font-size: 0.9rem;
            color: #6b7280;
          }
          .dd-key-hint {
            position: absolute;
            top: 6px;
            right: 9px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.05em;
          }
          @media (prefers-reduced-motion: reduce) {
            .dd-option-card { transition: none; }
            .dd-option-card:hover { transform: none; }
          }
        </style>
    </head>
    <body></body>
    <script type="module">
        import { default_dd_config, default_dd_simulation_config } from "./experiments/delay_discounting/dd_config.js";
        import { createSeededRng, simulateDelayDiscountingChoice } from "./experiments/delay_discounting/dd_simulation.js";
        import { createDelayDiscountingTimeline } from "./experiments/delay_discounting/delay_discounting_timeline.js";
        import { createMockAdoController } from "./experiments/delay_discounting/controllers/mock_ado_controller.js";
        import { createApiAdoController } from "./experiments/delay_discounting/controllers/api_ado_controller.js";

        const using_jatos = typeof jatos !== 'undefined';
        const url_params = new URLSearchParams(window.location.search);
        const ado_mode = url_params.get("ado") || "mock";
        const api_base = url_params.get("api") || "http://127.0.0.1:8000";
        const debug = url_params.get("debug") === "1";
        const requested_simulation_mode = url_params.get("simulate");
        const simulation_mode = ["data-only", "visual"].includes(requested_simulation_mode) ? requested_simulation_mode : null;
        const simulation_rng = createSeededRng(default_dd_simulation_config.seed);

        /**
         * Build jsPsych instructions-plugin simulation data.
         *
         * @param {number} page_count - Number of instruction pages.
         * @param {Object} simulation_config - Delay-discounting simulation settings.
         * @returns {Object} Plugin data with total rt and per-page view_history.
         */
        function makeInstructionSimulationData(page_count, simulation_config) {
            let view_history = [];
            for (let i = 0; i < page_count; i++) {
                view_history.push({
                    page_index: i,
                    viewing_time: simulation_config.rt.instructions,
                });
            }

            return {
                rt: page_count * simulation_config.rt.instructions,
                view_history: view_history,
            };
        }

        let adaptive_controller;
        if (ado_mode === "api") {
            adaptive_controller = createApiAdoController(default_dd_config, api_base);
        } else {
            adaptive_controller = createMockAdoController(default_dd_config);
        }

        const run_context = {
            ado_mode: ado_mode,
            api_base: api_base,
            debug: debug,
            simulation_mode: simulation_mode,
            using_jatos: using_jatos,
            session_id: using_jatos ? jatos.studyResultId : "local-" + Date.now(),
            /**
             * Return simulated jsPsych choice data for the current ADO design.
             *
             * @param {Object} design - Current SS/LL design from the controller.
             * @returns {Object} response/rt plus sim_* audit fields.
             */
            simulate_choice: function(design) {
                return simulateDelayDiscountingChoice(design, default_dd_simulation_config, simulation_rng);
            },
            jatos: using_jatos ? {
                studyResultId: jatos.studyResultId,
                componentResultId: jatos.componentResultId,
                workerId: jatos.workerId,
                batchId: jatos.batchId,
            } : null,
        };

        const instructions = {
            type: jsPsychInstructions,
            pages: [
                '<p>Welcome to the delay discounting task.</p><p>On each trial, choose between a smaller reward available sooner and a larger reward available later.</p>',
                '<p>The task will adapt after each response. Choose the option you genuinely prefer on each trial.</p>',
                '<p>Press Next when you are ready to begin.</p>',
            ],
            show_clickable_nav: true,
            key_forward: 'm',
            key_backward: 'z',
            button_label_previous: 'Previous (<strong>Z</strong>)',
            button_label_next: 'Next (<strong>M</strong>)',
            simulation_options: {
                data: makeInstructionSimulationData(3, default_dd_simulation_config),
            },
        };

        function fmt_k(v) {
            if (v == null) { return "—"; }
            return v.toExponential(3);
        }

        function fmt_tau(v) {
            if (v == null) { return "—"; }
            return v.toFixed(3);
        }

        function make_k_convergence_svg(k_series) {
            var W = 500, H = 200;
            var ml = 58, mr = 16, mt = 14, mb = 38;
            var pw = W - ml - mr;
            var ph = H - mt - mb;
            var n = k_series.length;

            if (n === 0) {
                return "<svg width=\"" + W + "\" height=\"" + H + "\"><text x=\"" + (W / 2) + "\" y=\"" + (H / 2) + "\" text-anchor=\"middle\" font-size=\"13\" fill=\"#6b7280\">No data</text></svg>";
            }

            var y_min = Infinity, y_max = -Infinity;
            k_series.forEach(function(d) {
                y_min = Math.min(y_min, d.mean - (d.sd || 0));
                y_max = Math.max(y_max, d.mean + (d.sd || 0));
            });
            var y_pad = (y_max - y_min) * 0.10 || 0.001;
            y_min -= y_pad;
            y_max += y_pad;

            function sx(i) { return ml + (n === 1 ? pw / 2 : (i / (n - 1)) * pw); }
            function sy(v) { return mt + ph - ((v - y_min) / (y_max - y_min)) * ph; }

            var band_top = [], band_bot = [];
            k_series.forEach(function(d, i) {
                band_top.push(sx(i) + "," + sy(d.mean + (d.sd || 0)));
                band_bot.unshift(sx(i) + "," + sy(d.mean - (d.sd || 0)));
            });
            var band_pts = band_top.concat(band_bot).join(" ");
            var line_pts = k_series.map(function(d, i) { return sx(i) + "," + sy(d.mean); }).join(" ");

            var y_ticks = "";
            for (var t = 0; t <= 3; t++) {
                var v = y_min + (y_max - y_min) * (t / 3);
                var yp = sy(v);
                y_ticks += "<line x1=\"" + ml + "\" y1=\"" + yp + "\" x2=\"" + (ml + pw) + "\" y2=\"" + yp + "\" stroke=\"#e5e7eb\" stroke-width=\"1\"/>"
                    + "<text x=\"" + (ml - 5) + "\" y=\"" + (yp + 4) + "\" text-anchor=\"end\" font-size=\"10\" fill=\"#6b7280\">" + v.toExponential(1) + "</text>";
            }

            var x_ticks = "";
            [0, Math.floor((n - 1) / 2), n - 1].forEach(function(i) {
                x_ticks += "<text x=\"" + sx(i) + "\" y=\"" + (mt + ph + 18) + "\" text-anchor=\"middle\" font-size=\"10\" fill=\"#6b7280\">" + k_series[i].trial + "</text>";
            });

            return "<svg width=\"" + W + "\" height=\"" + H + "\" style=\"display:block;margin:0 auto 2rem;\">"
                + "<rect x=\"" + ml + "\" y=\"" + mt + "\" width=\"" + pw + "\" height=\"" + ph + "\" fill=\"#f9fafb\" stroke=\"#e5e7eb\" stroke-width=\"1\"/>"
                + y_ticks
                + "<polygon points=\"" + band_pts + "\" fill=\"rgba(99,102,241,0.15)\"/>"
                + "<polyline points=\"" + line_pts + "\" fill=\"none\" stroke=\"#4f46e5\" stroke-width=\"2\" stroke-linejoin=\"round\"/>"
                + x_ticks
                + "<text x=\"" + (ml + pw / 2) + "\" y=\"" + (H - 5) + "\" text-anchor=\"middle\" font-size=\"11\" fill=\"#374151\">Trial</text>"
                + "<text x=\"12\" y=\"" + (mt + ph / 2) + "\" text-anchor=\"middle\" font-size=\"11\" fill=\"#374151\" transform=\"rotate(-90 12 " + (mt + ph / 2) + ")\">k</text>"
                + "</svg>";
        }

        function make_debrief_stimulus() {
            var rows = jsPsych.data.get().filter({task: "delay_discounting"}).values();
            var with_post = rows.filter(function(d) { return d.post_mean_k != null; });
            var last = with_post.length > 0 ? with_post[with_post.length - 1] : null;

            var k_series = with_post.map(function(d) {
                return {trial: d.trial_number, mean: d.post_mean_k, sd: d.post_sd_k};
            });

            return "<h2>Finished</h2>"
                + "<p style=\"margin-bottom:1.25rem;\">The experiment is complete.</p>"
                + "<table style=\"border-collapse:collapse;margin:0 auto 1.5rem;font-size:0.95rem;\">"
                + "<tr><td style=\"padding:4px 14px 4px 0;color:#6b7280;\">Discount rate k</td>"
                + "<td style=\"font-family:ui-monospace,monospace;\">" + fmt_k(last && last.post_mean_k) + (last && last.post_sd_k != null ? " <span style=\"color:#9ca3af;\">± " + fmt_k(last.post_sd_k) + "</span>" : "") + "</td></tr>"
                + "<tr><td style=\"padding:4px 14px 4px 0;color:#6b7280;\">Sensitivity τ (tau)</td>"
                + "<td style=\"font-family:ui-monospace,monospace;\">" + fmt_tau(last && last.post_mean_tau) + (last && last.post_sd_tau != null ? " <span style=\"color:#9ca3af;\">± " + fmt_tau(last.post_sd_tau) + "</span>" : "") + "</td></tr>"
                + "</table>"
                + "<p style=\"font-size:0.82rem;color:#6b7280;margin-bottom:0.5rem;text-align:center;\">k convergence across trials</p>"
                + make_k_convergence_svg(k_series);
        }

        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: function() {
                return make_debrief_stimulus();
            },
            choices: ["SUBMIT"],
            simulation_options: {
                data: {
                    response: 0,
                    rt: default_dd_simulation_config.rt.end,
                },
            },
        };

        jsPsych = initializeExperiment();
        jsPsych.data.addProperties({
            ado_mode: ado_mode,
            api_base: api_base,
            debug: debug,
            simulate: simulation_mode,
            simulation_seed: default_dd_simulation_config.seed,
            sim_k: default_dd_simulation_config.params.k,
            sim_tau: default_dd_simulation_config.params.tau,
        });

        let timeline = [instructions];
        timeline = timeline.concat(createDelayDiscountingTimeline(
            jsPsych,
            adaptive_controller,
            default_dd_config,
            run_context
        ));
        timeline.push(end_screen);

        if (simulation_mode) {
            jsPsych.simulate(timeline, simulation_mode);
        } else {
            jsPsych.run(timeline);
        }
    </script>
</html>
