<!DOCTYPE html>
<html>
    <head>
        <title>Delay Discounting</title>
        <script src="jatos.js"></script>
        <base href="../../">
        <script>
            // Set base URL of file paths different for JATOS than other hosting environments
            const base = document.querySelector('base');
            base.href = typeof jatos !== 'undefined' ? '.' : '../../';
        </script>
        <script src="core/jspsych/jspsych.js"></script>
        <script src="core/jspsych/plugins/plugin-html-button-response.js"></script>
        <script src="core/jspsych/plugins/plugin-call-function.js"></script>
        <script src="core/jspsych/plugins/plugin-instructions.js"></script>
        <link href="core/jspsych/css/jspsych.css" rel="stylesheet" type="text/css"></link>
        <script src="core/init_experiment.js"></script>
        <style>
          .dd-option-card {
            all: unset;
            box-sizing: border-box;
            cursor: pointer;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 220px;
            min-height: 140px;
            padding: 1.75rem 1.25rem;
            background: #ffffff;
            border: 2px solid #d1d5db;
            border-radius: 10px;
            position: relative;
            vertical-align: middle;
            transition: border-color 0.12s, box-shadow 0.12s, transform 0.12s;
          }
          .dd-option-card:hover {
            border-color: #4f46e5;
            box-shadow: 0 6px 20px -6px rgba(0, 0, 0, 0.22);
            transform: translateY(-2px);
          }
          .dd-option-card:focus-visible {
            outline: 3px solid #818cf8;
            outline-offset: 2px;
          }
          .dd-option-card[disabled] {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
          }
          .dd-amount {
            font-family: ui-monospace, "Courier New", monospace;
            font-size: 2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #111827;
          }
          .dd-when {
            font-size: 0.9rem;
            color: #6b7280;
          }
          .dd-key-hint {
            position: absolute;
            top: 6px;
            right: 9px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.05em;
          }
          @media (prefers-reduced-motion: reduce) {
            .dd-option-card { transition: none; }
            .dd-option-card:hover { transform: none; }
          }
        </style>
    </head>
    <body></body>
    <script type="module">
        // The delay-discounting experiment is now a THIN CONSUMER of the general
        // jspsych-ado package: it registers the hyperbolic model and asks the
        // façade to build the adaptive timeline. Nothing here is ADO-engine- or
        // timeline-specific; all of that lives in ../../jspsych-ado/.
        import { jsPsychADO } from "./jspsych-ado/index.js";
        import hyperbolicModel from "./jspsych-ado/models/hyperbolic/model.js";
        import { createAdoTimeline, makeDebriefStimulus } from "./jspsych-ado/ado/ado_timeline.js";
        import { createMockAdoController } from "./jspsych-ado/controllers/mock_ado_controller.js";
        import { createSeededRng, simulateDelayDiscountingChoice } from "./jspsych-ado/ado/ado_simulation.js";
        import { default_dd_config, default_dd_simulation_config } from "./experiments/delay_discounting/dd_config.js";

        const using_jatos = typeof jatos !== 'undefined';
        const url_params = new URLSearchParams(window.location.search);
        // Only "stan" (in-browser Stan inference + ADO, the live path) and "mock"
        // (fast deterministic dev controller, no WASM) are supported. Normalize the
        // recorded mode to what actually ran so data provenance is correct.
        const requested_ado_mode = url_params.get("ado");
        const ado_mode = requested_ado_mode === "mock" ? "mock" : "stan";
        if (requested_ado_mode && requested_ado_mode !== "mock" && requested_ado_mode !== "stan") {
            console.warn(`Unknown ado mode "${requested_ado_mode}"; running Stan.`);
        }
        const debug = url_params.get("debug") === "1";
        const requested_simulation_mode = url_params.get("simulate");
        const simulation_mode = ["data-only", "visual"].includes(requested_simulation_mode) ? requested_simulation_mode : null;
        const simulation_rng = createSeededRng(default_dd_simulation_config.seed);

        /**
         * Build jsPsych instructions-plugin simulation data.
         *
         * @param {number} page_count - Number of instruction pages.
         * @param {Object} simulation_config - Delay-discounting simulation settings.
         * @returns {Object} Plugin data with total rt and per-page view_history.
         */
        function makeInstructionSimulationData(page_count, simulation_config) {
            let view_history = [];
            for (let i = 0; i < page_count; i++) {
                view_history.push({
                    page_index: i,
                    viewing_time: simulation_config.rt.instructions,
                });
            }

            return {
                rt: page_count * simulation_config.rt.instructions,
                view_history: view_history,
            };
        }

        const param_history = {};
        const session_id = using_jatos ? jatos.studyResultId : "local-" + Date.now();

        const run_context = {
            ado_mode: ado_mode,
            model_id: hyperbolicModel.id,
            debug: debug,
            param_history: param_history,
            posterior_display: hyperbolicModel.posterior_display,
            simulation_mode: simulation_mode,
            using_jatos: using_jatos,
            session_id: session_id,
            /**
             * Return simulated jsPsych choice data for the current ADO design.
             *
             * @param {Object} design - Current SS/LL design from the controller.
             * @returns {Object} response/rt plus sim_* audit fields.
             */
            simulate_choice: function(design) {
                return simulateDelayDiscountingChoice(design, default_dd_simulation_config, simulation_rng, hyperbolicModel);
            },
            jatos: using_jatos ? {
                studyResultId: jatos.studyResultId,
                componentResultId: jatos.componentResultId,
                workerId: jatos.workerId,
                batchId: jatos.batchId,
            } : null,
        };

        // Register the hyperbolic model with the façade. linkProb/toStanData bridge
        // the friendly spec to the engine's argument order and data shape; the rest
        // (presentation, choices, priors, posterior display) comes straight from the
        // model package, so adding another model is just another registerModel call.
        jsPsychADO.registerModel(hyperbolicModel.id, {
            moduleUrl: hyperbolicModel.moduleUrl,
            prior: hyperbolicModel.prior,
            params: hyperbolicModel.params,
            design_grid: default_dd_config.grid_design,
            linkProb: (theta, design) => hyperbolicModel.choiceProbLL(design, theta),
            toStanData: (trials) =>
                hyperbolicModel.buildData(trials.map(({ design, response }) => ({ ...design, choice: response }))),
            response_labels: hyperbolicModel.response_labels,
            presentation: hyperbolicModel.presentation,
            choices: hyperbolicModel.choices,
            posterior_display: hyperbolicModel.posterior_display,
            stan: default_dd_config.stan,
            n_trials: default_dd_config.n_trials,
        });

        const plain_finish_stimulus = '<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>';

        const instructions = {
            type: jsPsychInstructions,
            pages: [
                '<p>Welcome to the delay discounting task.</p><p>On each trial, choose between a smaller reward available sooner and a larger reward available later.</p>',
                '<p>The task will adapt after each response. Choose the option you genuinely prefer on each trial.</p>',
                '<p>Press Next when you are ready to begin.</p>',
            ],
            show_clickable_nav: true,
            key_forward: 'm',
            key_backward: 'z',
            button_label_previous: 'Previous (<strong>Z</strong>)',
            button_label_next: 'Next (<strong>M</strong>)',
            simulation_options: {
                data: makeInstructionSimulationData(3, default_dd_simulation_config),
            },
        };

        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: plain_finish_stimulus,
            on_start: function(trial) {
                var bar = document.getElementById("ado-live-posterior-chart");
                if (bar) { bar.remove(); }
                trial.stimulus = run_context.debug
                    ? makeDebriefStimulus(run_context.param_history || {}, run_context.posterior_display)
                    : plain_finish_stimulus;
            },
            choices: ["SUBMIT"],
            simulation_options: {
                data: {
                    response: 0,
                    rt: default_dd_simulation_config.rt.end,
                },
            },
        };

        jsPsych = initializeExperiment();
        jsPsych.data.addProperties({
            ado_mode: ado_mode,
            model_id: hyperbolicModel.id,
            debug: debug,
            simulate: simulation_mode,
            simulation_seed: default_dd_simulation_config.seed,
            // Record the data-generating parameters generically (sim_k, sim_tau, ...).
            ...Object.fromEntries(
                Object.entries(default_dd_simulation_config.params).map(([name, value]) => ["sim_" + name, value])
            ),
        });

        let timeline = [instructions];
        if (ado_mode === "mock") {
            // Dev path: drive the SAME generic timeline directly with the
            // deterministic mock controller (no WASM, no façade compile step).
            const mock_controller = createMockAdoController(default_dd_config);
            timeline = timeline.concat(createAdoTimeline(jsPsych, mock_controller, {
                n_trials: default_dd_config.n_trials,
                response_labels: default_dd_config.response_labels,
                presentation: hyperbolicModel.presentation,
                choices: hyperbolicModel.choices,
                task: "delay_discounting",
            }, run_context));
        } else {
            // Live path: the façade builds the in-browser Stan controller + timeline.
            timeline = timeline.concat(jsPsychADO.createTimeline(jsPsych, {
                model: hyperbolicModel.id,
                session_id: session_id,
                task: "delay_discounting",
            }, run_context));
        }
        timeline.push(end_screen);

        if (simulation_mode) {
            jsPsych.simulate(timeline, simulation_mode);
        } else {
            jsPsych.run(timeline);
        }
    </script>
</html>
