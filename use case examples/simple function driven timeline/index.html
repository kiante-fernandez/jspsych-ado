<!DOCTYPE html>
<html>
  <head>
    <title>Simple Function-Driven Timeline</title>
    <base href="../../">

    <script src="core/jspsych/jspsych.js"></script>
    <script src="core/jspsych/plugins/plugin-html-button-response.js"></script>
    <script src="core/jspsych/plugins/plugin-call-function.js"></script>
    <script src="core/jspsych/plugins/plugin-instructions.js"></script>
    <link href="core/jspsych/css/jspsych.css" rel="stylesheet" type="text/css">
  </head>

  <body></body>

  <script type="module">
    import { createFunctionDrivenTimeline } from "./core/dynamic_timeline.js";

    const jsPsych = initJsPsych({
      on_finish: function() {
        jsPsych.data.displayData();
      }
    });

    const config = {
      n_trials: 8,
      response_labels: {
        0: "easy",
        1: "hard",
      },
    };

    function makeStimulus(design) {
      return `
        <div style="max-width: 720px; margin: 0 auto;">
          <h2>Trial ${design.trial_label}</h2>
          <p>This is a tiny example of dynamic stimuli without ADOpy.</p>
          <p style="font-size: 24px;">Current difficulty: <strong>${design.difficulty}</strong></p>
          <p>If you choose "Too easy", the next trial becomes harder.</p>
          <p>If you choose "Too hard", the next trial becomes easier.</p>
        </div>
      `;
    }

    function makeTrial({ trial_number, get_design, config }) {
      return {
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
          return makeStimulus(get_design());
        },
        choices: ["Too easy", "Too hard"],
        data: function() {
          const design = get_design();
          return {
            task: "simple_function_driven_timeline",
            trial_number,
            difficulty: design.difficulty,
          };
        },
        on_finish: function(data) {
          data.choice_label = config.response_labels[data.response];
        },
      };
    }

    function chooseNextDesign({ next_trial_number, last_trial_data, history }) {
      const previous_difficulty = last_trial_data.difficulty;
      const chose_too_easy = last_trial_data.response === 0;
      const next_difficulty = chose_too_easy
        ? previous_difficulty + 1
        : Math.max(1, previous_difficulty - 1);

      return {
        trial_label: next_trial_number,
        difficulty: next_difficulty,
        previous_choice: last_trial_data.choice_label,
        number_of_previous_trials: history.length,
      };
    }

    const instructions = {
      type: jsPsychInstructions,
      pages: [
        "<p>This example shows the simplest dynamic timeline pattern.</p>",
        "<p>The next trial is chosen by a normal JavaScript function using the previous trial data.</p>",
        "<p>No ADOpy or Python backend is used.</p>",
      ],
      show_clickable_nav: true,
    };

    const dynamic_trials = createFunctionDrivenTimeline({
      jsPsych,
      n_trials: config.n_trials,
      initial_design: {
        trial_label: 1,
        difficulty: 3,
      },
      make_trial: makeTrial,
      choose_next_design: chooseNextDesign,
      task_name: "simple_function_driven_timeline",
      config,
    });

    jsPsych.run([
      instructions,
      ...dynamic_trials,
    ]);
  </script>
</html>
