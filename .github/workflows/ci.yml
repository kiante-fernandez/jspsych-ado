name: CI

# Runs on PRs and on pushes to main. The unit job needs no dependencies; the
# browser job installs puppeteer (which brings its own Chromium) to exercise the
# Web Worker + WASM path that the node tests deliberately bypass.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit tests + Stan recovery smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Unit tests (MI engine, model adapter, facade)
        run: node --test tests/js/*.test.mjs
      - name: Stan recovery smoke - hyperbolic (real WASM via fetch shim)
        run: node tests/js/stan_recovery.smoke.mjs
      - name: Stan recovery smoke - weber dots (real WASM via fetch shim)
        run: node tests/js/weber_recovery.smoke.mjs
      - name: locateFile runtime smoke (emscripten honors the #57 glue patch)
        run: node tests/js/locate_file.smoke.mjs
      - name: Adaptive-stopping recovery smoke (real WASM EIG stopping, #21)
        run: node tests/js/stopping_recovery.smoke.mjs
      - name: Recovery smoke - 3-param categorical line-length (real WASM, #87)
        run: node tests/js/line_length_3ifc_recovery.smoke.mjs
      - name: Recovery smoke - exponential discounting (real WASM, demo model)
        run: node tests/js/exponential_recovery.smoke.mjs
      - name: Likelihood parity smoke (JS responseProb == compiled Stan, all models)
        run: node tests/js/likelihood_parity.smoke.mjs

  format:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dev deps (prettier)
        run: npm ci
      - name: Check formatting (prettier --check .)
        run: npm run format:check

  browser:
    name: Headless Worker/WASM smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dev deps (puppeteer + Chromium)
        run: npm ci
      - name: Headless browser smokes (delay discounting + line length)
        run: npm run test:browser

  bundler:
    name: Bundler smoke (npm pack -> Vite build -> headless WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dev deps (puppeteer + Chromium)
        run: npm ci
      # Packs the library, installs the tarball into tests/bundler/fixture, runs a
      # real Vite production build, and headlessly confirms the hashed WASM loads
      # through the public API — the only check that exercises the #57 fix under a
      # real bundler (node tests bypass the Worker; browser smokes serve raw source).
      - name: Bundler consumer smoke (Vite + hashed WASM)
        run: npm run test:bundler
