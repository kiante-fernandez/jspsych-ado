name: Build paper (LaTeX -> PDF + Markdown)

# On any push that touches the paper LaTeX, this:
#   1. compiles paper.tex -> paper.pdf (uploaded as a preview artifact), and
#   2. regenerates paper.md from body.tex + frontmatter.yaml (pandoc) and commits it
#      back, so the JOSS Markdown always tracks the .tex source.
#
# The regenerated-paper.md commit uses [skip ci] so it does not retrigger this workflow.

on:
  push:
    paths:
      - "paper/**"
      - ".github/workflows/draft-paper.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compile paper.tex -> PDF
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3
        with:
          working_directory: paper
          root_file: paper.tex

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Regenerate paper.md from LaTeX
        run: bash paper/build-md.sh

      - name: Commit paper.md if it changed
        run: |
          git add paper/paper.md
          if git diff --cached --quiet -- paper/paper.md; then
            echo "paper.md unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Regenerate paper.md from paper.tex [skip ci]"
            git push
          fi

      - name: Upload PDF
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: paper
          path: paper/paper.pdf
