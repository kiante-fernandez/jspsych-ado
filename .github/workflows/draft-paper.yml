name: Draft JOSS paper

# Builds a preview PDF of the JOSS paper with the Open Journals pipeline and uploads
# it as an artifact. No local toolchain required — download it from the run's
# "Artifacts" section.

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/draft-paper.yml'
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
