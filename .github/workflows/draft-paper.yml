name: Build paper (LaTeX -> PDF + Markdown)

# On any push that touches the paper LaTeX, this:
#   1. compiles paper.tex -> paper.pdf (uploaded as a preview artifact), and
#   2. regenerates paper.md from body.tex + frontmatter.yaml (pandoc) and commits it
#      back, so the JOSS Markdown always tracks the .tex source.
#
# The regenerated-paper.md commit uses [skip ci] so it does not retrigger this workflow.

on:
  push:
    paths:
      - "paper/**"
      - ".github/workflows/draft-paper.yml"
  workflow_dispatch:

# Least privilege by default; only the paper job needs write (to push the regenerated paper.md).
permissions:
  contents: read

concurrency:
  group: paper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  paper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the regenerated paper.md back to the branch
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compile paper.tex -> PDF
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4.1.0
        with:
          working_directory: paper
          root_file: paper.tex

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Regenerate paper.md from LaTeX
        run: bash paper/build-md.sh

      - name: Commit paper.md if it changed
        run: |
          git add paper/paper.md
          if git diff --cached --quiet -- paper/paper.md; then
            echo "paper.md unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Regenerate paper.md from paper.tex [skip ci]"
            git push
          fi

      - name: Upload PDF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paper
          path: paper/paper.pdf
