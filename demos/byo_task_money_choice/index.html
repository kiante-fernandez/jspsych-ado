<!DOCTYPE html>
<html>
    <head>
        <title>Bring Your Own Task - Money Choice</title>
        <base href="../../">
        <script src="https://unpkg.com/jspsych@8.2.3"></script>
        <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
        <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css"></link>
        <style>
          .mc-btn {
            all: unset;
            box-sizing: border-box;
            cursor: pointer;
            display: inline-block;
            min-width: 230px;
            margin: 0 0.5rem;
            padding: 1.1rem 1.4rem;
            font-size: 1.4rem;
            font-variant-numeric: tabular-nums;
            color: #111827;
            background: #f9fafb;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            position: relative;
          }
          .mc-btn:hover { border-color: #4f46e5; background: #ffffff; }
          .mc-btn:focus-visible { outline: 3px solid #818cf8; outline-offset: 2px; }
          .mc-btn[disabled] { opacity: 0.5; cursor: default; pointer-events: none; }
          .mc-key {
            position: absolute;
            top: 5px;
            left: 9px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #9ca3af;
          }
        </style>
        <!-- In your own project: npm install jspsych-ado, and these imports work as-is.
         This map lets the in-repo demo resolve the same bare specifiers locally. -->
    <script type="importmap">
      {
        "imports": {
          "jspsych-ado": "./src/index.js",
          "jspsych-ado/": "./src/"
        }
      }
    </script>
    </head>
    <body></body>
    <script type="module">
        import { jsPsychADO } from "jspsych-ado";
        import hyperbolicModel from "jspsych-ado/models/hyperbolic/model.js";
        import {
            buttonHtml,
            describeDesign,
            design_grid,
            makeChoices,
            response_labels,
        } from "./demos/byo_task_money_choice/task.js";

        const jsPsych = initJsPsych({
            on_finish: () => jsPsych.data.displayData(),
        });
        window.jsPsych = jsPsych;

        const instructions = {
            type: jsPsychInstructions,
            pages: [
                "<p>On each trial, choose the money option you genuinely prefer: a smaller amount sooner or a larger amount later.</p>",
                "<p>This demo pairs a task written from scratch with the packaged hyperbolic model.</p>",
                "<p>Press Next when you are ready to begin.</p>",
            ],
            show_clickable_nav: true,
        };

        const ado = jsPsychADO.createController(jsPsych, {
            model: hyperbolicModel,
            design_grid,
            stan: {
                num_chains: 2,
                num_warmup: 500,
                num_samples: 500,
                seed: 123,
            },
            n_trials: 42,
        });

        const keymap = { a: 0, b: 1 };
        const prompt = '<p style="margin-top:1rem;font-size:0.8rem;color:#9ca3af;">Press <strong>A</strong> for the sooner option · <strong>B</strong> for the later option</p>';

        let choice_key_handler = null;
        function enableChoiceKeys() {
            const key_to_choice = Object.fromEntries(
                Object.entries(keymap).map(([key, index]) => [key.toUpperCase(), index])
            );
            choice_key_handler = (event) => {
                const index = key_to_choice[event.key.toUpperCase()];
                if (index === undefined) return;
                const button = document.querySelector(`#jspsych-html-button-response-btngroup [data-choice="${index}"]`);
                if (button) button.click();
            };
            document.addEventListener("keydown", choice_key_handler);
        }

        function disableChoiceKeys() {
            if (choice_key_handler) {
                document.removeEventListener("keydown", choice_key_handler);
                choice_key_handler = null;
            }
        }

        const trial = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<p style="font-size:1.2rem;margin:0 0 1.5rem;">Which would you rather have?</p>',
            choices: () => makeChoices(ado.getDesign()),
            button_html: buttonHtml,
            prompt,
            on_load: enableChoiceKeys,
            on_finish: (data) => {
                disableChoiceKeys();
                ado.recordResponse(data.response);
            },
        };

        const plain_finish_stimulus = "<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>";
        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: plain_finish_stimulus,
            choices: ["SUBMIT"],
        };

        jsPsych.run([instructions, ...ado.createTimeline(trial, {
            describeDesign,
            response_labels,
        }), end_screen]);
    </script>
</html>
