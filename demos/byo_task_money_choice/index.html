<!DOCTYPE html>
<html>
    <head>
        <title>Bring Your Own Task — Money Choice</title>
        <base href="../../">
        <script src="https://unpkg.com/jspsych@7.3.4"></script>
        <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>
        <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
        <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
        <style>
          /* Styling for the from-scratch task's plain buttons (defined by THIS task,
             not the package — contrast with the packaged delay-discounting cards). */
          .mc-btn {
            all: unset;
            box-sizing: border-box;
            cursor: pointer;
            display: inline-block;
            min-width: 230px;
            margin: 0 0.5rem;
            padding: 1.1rem 1.4rem;
            font-size: 1.4rem;
            font-variant-numeric: tabular-nums;
            color: #111827;
            background: #f9fafb;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            position: relative;
          }
          .mc-btn:hover { border-color: #4f46e5; background: #ffffff; }
          .mc-btn:focus-visible { outline: 3px solid #818cf8; outline-offset: 2px; }
          .mc-btn[disabled] { opacity: 0.5; cursor: default; pointer-events: none; }
          .mc-key {
            position: absolute;
            top: 5px;
            left: 9px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #9ca3af;
          }
        </style>
    </head>
    <body></body>
    <script type="module">
        // BRING YOUR OWN TASK (pattern 2 — see demos/README.md).
        //
        // The TASK is authored from scratch in ./task.js (a plain money-choice
        // framing of delay discounting). The MODEL is the packaged hyperbolic model,
        // reused unchanged — because a task and a model are independent. The only
        // thing that differs from the delay-discounting demo is which TASK we import.

        // ↓↓↓ the task you wrote (vs the packaged tasks/delay_discounting/) ↓↓↓
        import moneyChoiceTask from "./demos/byo_task_money_choice/task.js";
        // ↑↑↑                                                              ↑↑↑
        import hyperbolicModel from "./src/models/hyperbolic/model.js"; // packaged model, reused

        import { makeDebriefStimulus, removeAdoDebugPanels } from "./src/ado/debug/posterior_convergence_charts.js";
        import { createSeededRng, simulateDelayDiscountingChoice } from "./src/ado/ado_simulation.js";
        import {
            addAdoDataProperties,
            createExperimentAdoTimeline,
            getExperimentRunSettings,
            makeAdoRunContext,
            makeEndSimulationData,
            makeInstructionSimulationData,
            registerAdoExperiment,
            resolveSimulationConfig,
        } from "./demos/_shared/experiment_shell.js";
        import { default_mc_config, default_mc_simulation_config } from "./demos/byo_task_money_choice/mc_config.js";

        const task = moneyChoiceTask;
        const model = hyperbolicModel;

        // ── DEMO SCAFFOLDING — URL switches + simulated participant (runnable/testable). ──
        const url_params = new URLSearchParams(window.location.search);
        const run_config = window.__JSPSYCH_ADO_RUN_CONFIG__ || {};
        const session_id = "local-" + Date.now();

        const run_settings = getExperimentRunSettings(url_params);
        const simulation_config = resolveSimulationConfig(
            default_mc_simulation_config,
            run_config,
            run_settings.simulation_mode
        );
        const simulation_rng = createSeededRng(simulation_config.seed);

        const run_context = makeAdoRunContext({
            run_settings: run_settings,
            model: model,
            session_id: session_id,
            simulate_choice: function(design) {
                return simulateDelayDiscountingChoice(design, simulation_config, simulation_rng, model);
            },
        });

        // ── THE ADO INTERFACE (1/2) — register YOUR task + the packaged model. ──
        registerAdoExperiment({
            task: task,
            model: model,
            config: default_mc_config,
        });

        // ── STANDARD jsPsych — ordinary instructions + end screen. ──
        const plain_finish_stimulus = '<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>';

        const instructions = {
            type: jsPsychInstructions,
            pages: [
                '<p>On each trial, choose the money option you genuinely prefer: a smaller amount sooner (A) or a larger amount later (B).</p>',
                '<p>This run pairs a task written from scratch with the packaged hyperbolic model. The task adapts after each response.</p>',
                '<p>Press Next when you are ready to begin.</p>',
            ],
            show_clickable_nav: true,
            key_forward: 'm',
            key_backward: 'z',
            button_label_previous: 'Previous (<strong>Z</strong>)',
            button_label_next: 'Next (<strong>M</strong>)',
            simulation_options: {
                data: makeInstructionSimulationData(3, simulation_config),
            },
        };

        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: plain_finish_stimulus,
            on_start: function(trial) {
                removeAdoDebugPanels();
                trial.stimulus = run_context.debug
                    ? makeDebriefStimulus(run_context.param_history || {}, run_context.posterior_display)
                    : plain_finish_stimulus;
            },
            choices: ["SUBMIT"],
            simulation_options: {
                data: makeEndSimulationData(simulation_config),
            },
        };

        jsPsych = initJsPsych({
            on_finish: () => jsPsych.data.displayData()
        });
        addAdoDataProperties(jsPsych, {
            run_settings: run_settings,
            model: model,
            simulation_config: simulation_config,
        });

        // ── THE ADO INTERFACE (2/2) — build the adaptive timeline and run it. ──
        let timeline = [instructions];
        timeline = timeline.concat(createExperimentAdoTimeline(jsPsych, {
            task: task,
            model: model,
            config: default_mc_config,
            run_context: run_context,
            session_id: session_id,
            design_seed: run_config.controller ? run_config.controller.design_seed : null,
        }));
        timeline.push(end_screen);

        if (run_settings.simulation_mode) {
            jsPsych.simulate(timeline, run_settings.simulation_mode);
        } else {
            jsPsych.run(timeline);
        }
    </script>
</html>
