<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Magnitude Estimation (Stevens power law) ADO</title>
    <base href="../../" />
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-slider-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />
      <!-- In your own project: npm install jspsych-ado, and these imports work as-is.
         This map lets the in-repo demo resolve the same bare specifiers locally. -->
    <script type="importmap">
      {
        "imports": {
          "jspsych-ado": "./src/index.js",
          "jspsych-ado/": "./src/"
        }
      }
    </script>
</head>
  <body></body>
  <script type="module">
    import { jsPsychADO } from "jspsych-ado";
    import magnitudeModel from "jspsych-ado/models/magnitude_estimation/model.js";
    import {
      CANVAS_SIZE,
      SLIDER_MIN,
      SLIDER_MAX,
      design_grid,
      drawDisk,
      describeDesign,
      responseToOutcome,
    } from "./demos/magnitude_estimation/task.js";

    const jsPsych = initJsPsych({
      on_finish: () => jsPsych.data.displayData(),
    });
    window.jsPsych = jsPsych;

    const instructions = {
      type: jsPsychInstructions,
      pages: [
        "<p>Welcome to the size estimation task.</p><p>On each trial you will see a filled shape.</p>",
        "<p>Estimate how large the shape feels to you on the slider — there are no right or wrong answers.</p>",
        "<p>The task will adapt after each response. Press Next when you are ready to begin.</p>",
      ],
      show_clickable_nav: true,
    };

    const ado = jsPsychADO.createController(jsPsych, {
      model: magnitudeModel,
      design_grid,
      stan: {
        num_chains: 2,
        num_warmup: 500,
        num_samples: 500,
        seed: 123,
      },
      n_trials: 20,
    });

    // Demo-owned URL flag: ?simulate=data-only|visual runs a synthetic participant
    // via jsPsych.simulate(). The simulator draws the MODELED response y (log space)
    // from the model's responseSampler; `respond` maps it back to a raw slider value
    // so the trial's on_finish log() recovers the modeled response.
    const simulate_mode = new URLSearchParams(window.location.search).get("simulate");
    const simulate = simulate_mode
      ? {
          mode: simulate_mode,
          participant: { loga: -1.5, b: 0.7, sigma: 0.25 },
          rt_ms: 600,
          seed: 123,
          respond: (design, sim) => ({ ...sim, response: Math.exp(sim.response) }),
        }
      : null;

    // A continuous-response trial is an ordinary canvas-slider trial: the design's
    // area drives the drawing, and on_finish records the MODELED response
    // y = log(estimate) (the raw slider value stays on data.response).
    const trial = {
      type: jsPsychCanvasSliderResponse,
      stimulus: (canvas) => drawDisk(canvas, ado.getDesign()),
      canvas_size: CANVAS_SIZE,
      min: SLIDER_MIN,
      max: SLIDER_MAX,
      step: 1,
      slider_start: Math.round((SLIDER_MIN + SLIDER_MAX) / 2),
      labels: ["smallest", "largest"],
      prompt: "<p>How large is this shape? Set the slider to your estimate of its size.</p>",
      require_movement: true,
      on_finish: (data) => ado.recordResponse(responseToOutcome(data.response)),
    };

    const end_screen = {
      type: jsPsychHtmlButtonResponse,
      stimulus: "<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>",
      choices: ["SUBMIT"],
    };

    const adoTimeline = ado.createTimeline(trial, { describeDesign, simulate });
    const experiment = [instructions, ...adoTimeline, end_screen];

    if (simulate_mode) {
      jsPsych.simulate(experiment, simulate_mode);
    } else {
      jsPsych.run(experiment);
    }
  </script>
</html>
