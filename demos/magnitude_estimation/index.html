<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Magnitude Estimation (Stevens power law) ADO</title>
    <base href="../../" />
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-slider-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  </head>
  <body></body>
  <script type="module">
    import { makeDebriefStimulus } from "./src/ado/debug/posterior_convergence_charts.js";
    import { createSeededRng, simulateContinuousResponse } from "./src/ado/ado_simulation.js";
    import {
      addAdoDataProperties,
      createExperimentAdoTimeline,
      getExperimentRunSettings,
      makeAdoRunContext,
      makeEndSimulationData,
      makeInstructionSimulationData,
      registerAdoExperiment,
      resolveSimulationConfig,
    } from "./demos/_shared/experiment_shell.js";
    import magnitudeTask, {
      SLIDER_MIN,
      SLIDER_MAX,
    } from "./src/tasks/magnitude_estimation/task.js";
    import magnitudeModel from "./src/models/magnitude_estimation/model.js";
    import {
      default_magnitude_estimation_config,
      default_magnitude_estimation_simulation_config,
    } from "./demos/magnitude_estimation/magnitude_estimation_config.js";

    // Drop-in demo (pattern 1 — see demos/README.md): a PACKAGED task + PACKAGED
    // model, here a CONTINUOUS-response task (a slider). Three layers below: THE ADO
    // INTERFACE (register + build), STANDARD jsPsych, and DEMO SCAFFOLDING (URL
    // switches + simulation, not needed in your own experiment).
    // ── DEMO SCAFFOLDING ──
    const url_params = new URLSearchParams(window.location.search);
    const run_config = window.__JSPSYCH_ADO_RUN_CONFIG__ || {};
    const session_id = "local-" + Date.now();
    const run_settings = getExperimentRunSettings(url_params);
    const simulation_config = resolveSimulationConfig(
      default_magnitude_estimation_simulation_config,
      run_config,
      run_settings.simulation_mode,
    );
    const simulation_rng = createSeededRng(simulation_config.seed);

    function simulateMagnitudeEstimation(design) {
      // The model response is y = log(estimate); the slider records the RAW estimate,
      // and the task's responseToOutcome logs it back. So convert and clamp to the
      // slider's range, exactly as a participant's slider value would be bounded.
      const data = simulateContinuousResponse(
        design,
        simulation_config,
        simulation_rng,
        magnitudeModel,
      );
      const raw_estimate = Math.exp(data.response);
      const clamped = Math.min(SLIDER_MAX, Math.max(SLIDER_MIN, raw_estimate));
      return {
        ...data,
        response: clamped,
        sim_log_estimate: data.response,
        sim_estimate: clamped,
      };
    }

    const run_context = makeAdoRunContext({
      run_settings: run_settings,
      model: magnitudeModel,
      session_id: session_id,
      simulate_choice: simulateMagnitudeEstimation,
    });

    // ── THE ADO INTERFACE (1/2) — register the packaged task + model. ──
    registerAdoExperiment({
      task: magnitudeTask,
      model: magnitudeModel,
      config: default_magnitude_estimation_config,
    });

    const plain_finish_stimulus =
      "<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>";

    const instructions = {
      type: jsPsychInstructions,
      pages: [
        "<p>Welcome to the size-estimation task.</p><p>On each trial you will see a single blue shape.</p>",
        "<p>Your job is to estimate how <strong>large</strong> the shape is by moving the slider, then click Continue.</p><p>There are no right or wrong answers — just give your impression of its size.</p>",
        "<p>The shapes shown will adapt to your responses. Press Next when you are ready to begin.</p>",
      ],
      show_clickable_nav: true,
      key_forward: "m",
      key_backward: "z",
      button_label_previous: "Previous (<strong>Z</strong>)",
      button_label_next: "Next (<strong>M</strong>)",
      simulation_options: {
        data: makeInstructionSimulationData(3, simulation_config),
      },
    };

    const end_screen = {
      type: jsPsychHtmlButtonResponse,
      stimulus: plain_finish_stimulus,
      on_start: function (trial) {
        var bar = document.getElementById("ado-live-posterior-chart");
        if (bar) {
          bar.remove();
        }
        trial.stimulus = run_context.debug
          ? makeDebriefStimulus(run_context.param_history || {}, run_context.posterior_display)
          : plain_finish_stimulus;
      },
      choices: ["SUBMIT"],
      simulation_options: {
        data: makeEndSimulationData(simulation_config),
      },
    };

    jsPsych = initJsPsych({
      on_finish: () => jsPsych.data.displayData(),
    });
    addAdoDataProperties(jsPsych, {
      run_settings: run_settings,
      model: magnitudeModel,
      simulation_config: simulation_config,
    });

    // ── THE ADO INTERFACE (2/2) — build the adaptive timeline and run it. ──
    let timeline = [instructions];
    timeline = timeline.concat(
      createExperimentAdoTimeline(jsPsych, {
        task: magnitudeTask,
        model: magnitudeModel,
        config: default_magnitude_estimation_config,
        run_context: run_context,
        session_id: session_id,
        design_seed: run_config.controller ? run_config.controller.design_seed : null,
      }),
    );
    timeline.push(end_screen);

    if (run_settings.simulation_mode) {
      jsPsych.simulate(timeline, run_settings.simulation_mode);
    } else {
      jsPsych.run(timeline);
    }
  </script>
</html>
