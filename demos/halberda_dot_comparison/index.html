<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Halberda Dot Comparison ADO</title>
        <base href="../../">
        <script src="https://unpkg.com/jspsych@8.2.3"></script>
        <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
        <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css">
        <link href="demos/halberda_dot_comparison/style.css" rel="stylesheet" type="text/css">
        <!-- In your own project: npm install jspsych-ado, and these imports work as-is.
         This map lets the in-repo demo resolve the same bare specifiers locally. -->
    <script type="importmap">
      {
        "imports": {
          "jspsych-ado": "./src/index.js",
          "jspsych-ado/": "./src/"
        }
      }
    </script>
    </head>
    <body></body>
    <script type="module">
        import { jsPsychADO } from "jspsych-ado";
        import weberDotsModel from "jspsych-ado/models/weber_dots/model.js";
        import {
            design_grid,
            describeDesign,
            makeDotComparisonTrials,
            response_labels,
        } from "./demos/halberda_dot_comparison/task.js";

        const jsPsych = initJsPsych({
            on_finish: () => jsPsych.data.displayData(),
        });
        window.jsPsych = jsPsych;

        const instructions = {
            type: jsPsychInstructions,
            pages: [
                "<p>Welcome to the dot comparison task.</p><p>You will briefly see blue and yellow dots.</p>",
                "<p>Your job is to decide which color has more dots. Press <strong>B</strong> for blue and <strong>Y</strong> for yellow.</p><p>The display is very fast, so do not try to count.</p>",
                "<p>The task will adapt after each response. Press Next when you are ready to begin.</p>",
            ],
            show_clickable_nav: true,
        };

        const ado = jsPsychADO.createController(jsPsych, {
            model: weberDotsModel,
            design_grid,
            stan: {
                num_chains: 2,
                num_warmup: 500,
                num_samples: 500,
                seed: 123,
            },
            n_trials: 40,
        });

        const plain_finish_stimulus = "<h2>Finished</h2><p>The experiment is complete. Click SUBMIT to finish.</p>";
        const end_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: plain_finish_stimulus,
            choices: ["SUBMIT"],
        };

        const adoTimeline = ado.createTimeline(makeDotComparisonTrials, {
            describeDesign,
            response_labels,
        });

        jsPsych.run([instructions, ...adoTimeline, end_screen]);
    </script>
</html>
